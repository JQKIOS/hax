<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XUMOD - IPA Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <header class="main-header">
            <a href="#" class="header-left">
                <img src="https://via.placeholder.com/40" alt="XUMOD Logo" class="brand-logo">
                <div class="brand-info">
                    <h1 class="brand-name">XUMOD</h1>
                    <span class="brand-sub">App Store</span>
                </div>
            </a>
        </header>

        <section class="category-section">
            <div class="category-header">
                <h2 class="category-title">8 Ball Pool</h2>
                <span class="apps-count">1 apps</span>
            </div>
            <div class="apps-list">
                <a href="https://link-tai-game-8ball.com" class="app-item">
                    <img src="https://via.placeholder.com/60" alt="8 ball pool" class="app-icon">
                    <div class="app-details">
                        <h3 class="app-name">8 ball pool</h3>
                        <p class="app-slug">8-ball-pool</p>
                    </div>
                </a>
            </div>
        </section>

        <section class="category-section">
            <div class="category-header">
                <h2 class="category-title">CFM IOS</h2>
                <span class="apps-count">3 apps</span>
            </div>
            <div class="apps-list">
                <a href="#" class="app-item">
                    <img src="https://via.placeholder.com/60" alt="CFL ZORO" class="app-icon">
                    <div class="app-details">
                        <h3 class="app-name">CFL ZORO</h3>
                        <p class="app-slug">cfl-zoro</p>
                    </div>
                </a>
                <a href="#" class="app-item">
                    <img src="https://via.placeholder.com/60" alt="CFL RAVEN" class="app-icon">
                    <div class="app-details">
                        <h3 class="app-name">CFL RAVEN</h3>
                        <p class="app-slug">cfm-raven</p>
                    </div>
                </a>
                <a href="#" class="app-item">
                    <img src="https://via.placeholder.com/60" alt="CFM LUXURY IOS" class="app-icon">
                    <div class="app-details">
                        <h3 class="app-name">CFM LUXURY IOS</h3>
                        <p class="app-slug">cfm-luxury-ios</p>
                    </div>
                </a>
            </div>
        </section>

        <section class="category-section">
            <div class="category-header">
                <h2 class="category-title">delta force</h2>
                <span class="apps-count">3 apps</span>
            </div>
            <div class="apps-list">
                <a href="#" class="app-item">
                    <img src="https://via.placeholder.com/60" alt="DELTA IOS VIP" class="app-icon">
                    <div class="app-details">
                        <h3 class="app-name">DELTA IOS VIP</h3>
                        <p class="app-slug">delta-ios-vip</p>
                    </div>
                </a>
                <a href="#" class="app-item">
                    <img src="https://via.placeholder.com/60" alt="delta" class="app-icon">
                    <div class="app-details">
                        <h3 class="app-name">delta</h3>
                        <p class="app-slug">delta</p>
                    </div>
                </a>
                <a href="#" class="app-item">
                    <img src="https://via.placeholder.com/60" alt="delta ios" class="app-icon">
                    <div class="app-details">
                        <h3 class="app-name">delta ios</h3>
                        <p class="app-slug">delta-ios</p>
                    </div>
                </a>
            </div>
        </section>

        <footer class="site-footer">
            <a href="https://ipa.xumod.vn" class="footer-url">ipa.xumod.vn</a>
        </footer>

    </div>

</body>
</html>
